<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Dealer</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
background:#FFFFFF;
color:#12AAEE;
overflow-x:hidden;
}




  body{
      background:#f5f5f5;
    }

    /* TOP HEADER */
    .top-header{
      width:100%;
      background:#27a9e1;
      padding:12px 20px;
    }

    .header-container{
      max-width:1400px;
      margin:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:15px;
    }

    /* LEFT SIDE */
    .left-section{
      display:flex;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .email{
      color:#fff;
      font-size:16px;
      font-weight:600;
    }

    .social-icons{
      display:flex;
      gap:18px;
    }

    .social-icons a{
      color:#fff;
      text-decoration:none;
      font-size:24px;
      font-weight:bold;
      transition:0.3s;
    }

    .social-icons a:hover{
      transform:scale(1.1);
      opacity:0.8;
    }

    /* RIGHT SIDE */
    .right-section{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .btn{
      background:#f26a21;
      color:#fff;
      text-decoration:none;
      padding:12px 22px;
      font-size:16px;
      font-weight:bold;
      border-radius:2px;
      transition:0.3s;
      white-space:nowrap;
    }

    .btn:hover{
      background:#d95c1d;
    }

    /* RESPONSIVE */
    @media (max-width:768px){

      .header-container{
        flex-direction:column;
        align-items:center;
        text-align:center;
      }

      .left-section{
        flex-direction:column;
        gap:12px;
      }

      .social-icons{
        justify-content:center;
      }

      .right-section{
        justify-content:center;
      }

      .btn{
        padding:10px 16px;
        font-size:14px;
      }

      .email{
        font-size:14px;
      }
    }

    @media (max-width:480px){

      .right-section{
        width:100%;
        flex-direction:column;
      }

      .btn{
        width:100%;
        text-align:center;
      }

      .social-icons a{
        font-size:20px;
      }
    }

    

/* NAVBAR */

.navbar{
width:100%;
background:linear-gradient(90deg,#0B7DB3,#07142f);
background-color: #12AAEE;
padding:16px 5%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

.logo img{
height:70px;
background:white;
padding:5px;
border-radius:8px;
}

.menu{
display:flex;
align-items:center;
gap:20px;
}

.menu a{
text-decoration:none;
color:white;
font-weight:500;
transition:.3s;
}

.menu a:hover{
color:#EB5C22;
}

.call-btn{
/* background:linear-gradient(135deg,#EB5C22,#12AAEE); */
background-color: #12AAEE;
padding:12px 20px;
border-radius:12px;
color:white;
}

.hamburger{
display:none;
font-size:30px;
color:white;
cursor:pointer;
}

/* SESSION */

.session{
display:flex;
align-items:center;
gap:10px;
color:white;
font-size:14px;
}

.session-box{
background:rgba(255,255,255,0.08);
padding:8px 14px;
border-radius:10px;
color:white;
font-weight:bold;
}

/* PROFILE */

.profile{
display:flex;
align-items:center;
gap:10px;
color:white;
}

.profile-icon{
width:38px;
height:38px;
border-radius:50%;
/* background:linear-gradient(135deg,#EB5C22,#12AAEE); */
background-color: #EB5C22;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
color:white;
}

/* HERO */

.hero{
padding:80px 5%;
text-align:center;
}

.hero h1{
font-size:52px;
color:#12AAEE;
}

.hero span{
color:#EB5C22;
}

.hero p{
margin-top:15px;
font-size:20px;
}

/* SEARCH BOX */

.search-box{
max-width:800px;
margin:40px auto;
background:#FFFFFF;
border:2px solid #12AAEE;
padding:35px;
border-radius:20px;
box-shadow:0 8px 20px rgba(18,170,238,0.15);
}

.input-group{
margin-bottom:20px;
text-align:left;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,select{
width:100%;
padding:15px;
border:2px solid #12AAEE;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
background:#EB5C22;
color:#FFFFFF;
border:none;
border-radius:10px;
font-size:18px;
font-weight:600;
cursor:pointer;
}

.result-box{
margin-top:25px;
padding:20px;
background:#12AAEE;
color:#FFFFFF;
border-radius:12px;
}

/* FOOTER */

.footer{
background:linear-gradient(90deg,#12AAEE,#EB5C22);
padding:25px;
text-align:center;
color:#FFFFFF;
margin-top:60px;
}

/* FOOTER */

.footer{
background:linear-gradient(90deg,#0B7DB3,#07142f);
padding:30px 5%;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
}

.footer-logo{
width:46px;
height:46px;
border-radius:12px;
background:linear-gradient(135deg,#EB5C22,#12AAEE);
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

.footer-links{
display:flex;
gap:20px;
}

.footer-links a{
color:white;
text-decoration:none;
}

.footer-links a:hover{
color:#EB5C22;
}

/* MOBILE */

@media(max-width:768px){

.hamburger{
display:block;
}

.menu{
display:none;
position:absolute;
top:80px;
left:0;
width:100%;
background:#12AAEE;
flex-direction:column;
padding:20px;
text-align:center;
gap:18px;
}

.menu.active{
display:flex;
}

.menu a{
padding:12px 0;
}

.hero h1{
font-size:36px;
}

.hero p{
font-size:16px;
}

.search-box{
padding:20px;
}

.footer{
flex-direction:column;
text-align:center;
}
}
</style>
</head>

<body>

    <!-- Top Header -->

  <div class="top-header">

    <div class="header-container">

      <!-- LEFT -->
      <div class="left-section">

        <div class="email">

        </div>

        <div class="social-icons">

      </div>

        <a href="#" class="btn">Create Account</a>

        <a href="#" class="btn">Sign In</a>

        <a href="#" class="btn">Franchise Opportunities</a>

      </div>

    </div>

  </div>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
<img src="images/logo1.svg" alt="Logo">
</div>

<div class="session">

</div>

</nav>

<!-- HERO -->

<!-- FOOTER -->

<footer class="footer">

<div class="footer-logo"><img src="images/logo1.jpg" alt="" height="50px" width="200px"></div>

<div class="footer-links">

</div>

</footer>

</body>
</html>
