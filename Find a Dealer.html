<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Dealer</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
background:#FFFFFF;
color:#12AAEE;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
width:100%;
background:linear-gradient(90deg,#0B7DB3,#07142f);
background-color: #12AAEE;
padding:16px 5%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

.logo img{
height:70px;
background:white;
padding:5px;
border-radius:8px;
}

.menu{
display:flex;
align-items:center;
gap:20px;
}

.menu a{
text-decoration:none;
color:white;
font-weight:500;
transition:.3s;
}

.menu a:hover{
color:#EB5C22;
}

.call-btn{
/* background:linear-gradient(135deg,#EB5C22,#12AAEE); */
background-color: #12AAEE;
padding:12px 20px;
border-radius:12px;
color:white;
}

.hamburger{
display:none;
font-size:30px;
color:white;
cursor:pointer;
}

/* SESSION */

.session{
display:flex;
align-items:center;
gap:10px;
color:white;
font-size:14px;
}

.session-box{
background:rgba(255,255,255,0.08);
padding:8px 14px;
border-radius:10px;
color:white;
font-weight:bold;
}

/* PROFILE */

.profile{
display:flex;
align-items:center;
gap:10px;
color:white;
}

.profile-icon{
width:38px;
height:38px;
border-radius:50%;
/* background:linear-gradient(135deg,#EB5C22,#12AAEE); */
background-color: #EB5C22;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
color:white;
}

/* HERO */

.hero{
padding:80px 5%;
text-align:center;
}

.hero h1{
font-size:52px;
color:#12AAEE;
}

.hero span{
color:#EB5C22;
}

.hero p{
margin-top:15px;
font-size:20px;
}

/* SEARCH BOX */

.search-box{
max-width:800px;
margin:40px auto;
background:#FFFFFF;
border:2px solid #12AAEE;
padding:35px;
border-radius:20px;
box-shadow:0 8px 20px rgba(18,170,238,0.15);
}

.input-group{
margin-bottom:20px;
text-align:left;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,select{
width:100%;
padding:15px;
border:2px solid #12AAEE;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
background:#EB5C22;
color:#FFFFFF;
border:none;
border-radius:10px;
font-size:18px;
font-weight:600;
cursor:pointer;
}

.result-box{
margin-top:25px;
padding:20px;
background:#12AAEE;
color:#FFFFFF;
border-radius:12px;
}

/* FOOTER */

.footer{
background:linear-gradient(90deg,#12AAEE,#EB5C22);
padding:25px;
text-align:center;
color:#FFFFFF;
margin-top:60px;
}

/* FOOTER */

.footer{
background:linear-gradient(90deg,#0B7DB3,#07142f);
padding:30px 5%;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
}

.footer-logo{
width:46px;
height:46px;
border-radius:12px;
background:linear-gradient(135deg,#EB5C22,#12AAEE);
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

.footer-links{
display:flex;
gap:20px;
}

.footer-links a{
color:white;
text-decoration:none;
}

.footer-links a:hover{
color:#EB5C22;
}

/* MOBILE */

@media(max-width:768px){

.hamburger{
display:block;
}

.menu{
display:none;
position:absolute;
top:80px;
left:0;
width:100%;
background:#12AAEE;
flex-direction:column;
padding:20px;
text-align:center;
gap:18px;
}

.menu.active{
display:flex;
}

.menu a{
padding:12px 0;
}

.hero h1{
font-size:36px;
}

.hero p{
font-size:16px;
}

.search-box{
padding:20px;
}

.footer{
flex-direction:column;
text-align:center;
}
}
</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
<img src="images/logo1.svg" alt="Logo">
</div>

<div class="hamburger" id="hamburger">☰</div>

<div class="menu" id="menu">

<a href="index.html"><b>Home</b></a>
<a href="Products.html"><b>Products</b></a>
<a href="Find a Dealer.html"><b>Find Dealer</b></a>
<a href="#" class="call-btn"><b>Call Now</b></a>

<div class="session">
<span><b>Session:</b></span>
<div class="session-box" id="sessionTimer"><b>25:00</b></div>
</div>

<div class="profile">
<div class="profile-icon">A</div>
<span><b>admin@excellentgd.com</b></span>
</div>

</div>

</nav>

<!-- HERO -->

<section class="hero">

<h1>Find a <span>Dealer</span></h1>
<p>Locate approved Excellent Garage Door dealers near you</p>

<div class="search-box">

<div class="input-group">
<label>ZIP Code</label>
<input type="text" placeholder="Enter ZIP Code">
</div>

<div class="input-group">
<label>Radius</label>
<select>
<option>25 Miles</option>
<option>50 Miles</option>
<option>100 Miles</option>
</select>
</div>

<button>Search Dealer</button>

<!-- <div class="result-box">
Nearest Dealer: Excellent Garage Chennai<br>
Distance: 12 Miles
</div> -->

</div>

</section>

<!-- FOOTER -->

<footer class="footer">

<div class="footer-logo"><img src="images/logo1.jpg" alt="" height="50px" width="200px"></div>

<div class="footer-links">
<a href="#"><b>Products</b></a>
<a href="#"><b>Dealers</b></a>
<a href="#"><b>Support</b></a>
</div>

<p><b>© 2026 Excellent Garage Door</b></p>

</footer>   

<script>
const hamburger=document.getElementById("hamburger");
const menu=document.getElementById("menu");

hamburger.addEventListener("click",function(){
menu.classList.toggle("active");
});
</script>

</body>
</html>
